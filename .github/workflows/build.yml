name: Build Standard iOS App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Select Xcode Version
      run: sudo xcode-select -s /Applications/Xcode_15.0.app

    - name: Build Xcode Project
      run: |
        # Lệnh này dùng để biên dịch các dự án có file .xcodeproj tiêu chuẩn
        # xcodebuild -project YourProject.xcodeproj -scheme YourScheme -sdk iphoneos build
        echo "Sẵn sàng biên dịch dự án iOS tiêu chuẩn."
