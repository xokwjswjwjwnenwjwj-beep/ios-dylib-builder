#!/bin/bash
# ONE SCRIPT: Extract + Patch + Package IPA

IPA="FreeFire.ipa"
DYLIB="FreeFireHack.dylib"

[ ! -f "$IPA" ] && echo "Missing $IPA" && exit 1
[ ! -f "$DYLIB" ] && echo "Missing $DYLIB" && exit 1

unzip -q "$IPA" -d tmp
APP=$(find tmp -name "*.app" -type d|head -1)
BIN="$APP/$(basename "$APP" .app)"

mkdir -p "$APP/Frameworks"
cp "$DYLIB" "$APP/Frameworks/"
install_name_tool -add_rpath @executable_path/Frameworks "$BIN"
ldid -S "$BIN" 2>/dev/null || true

zip -qr patched.ipa tmp/
rm -rf tmp
echo "✅ patched.ipa ready!"
