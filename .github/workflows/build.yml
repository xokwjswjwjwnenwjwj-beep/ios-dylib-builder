name: Build iOS Dylib

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Compile Dylib for iOS
      run: |
        clang -dynamiclib -isysroot $(xcrun --sdk iphoneos --show-sdk-path) -arch arm64 -miphoneos-version-min=14.0 -o libmylib_ios.dylib mylib.c
        codesign --force --sign - libmylib_ios.dylib

    - name: Upload Dylib Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-dylib
        path: libmylib_ios.dylib
